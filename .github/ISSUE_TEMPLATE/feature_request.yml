name: Feature Request
description: Suggest a new feature or improvement for omega-backup
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: Describe the problem this feature would solve, or the use case that motivated the request.
      placeholder: "I often find myself needing to ... but currently there's no way to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. Be as specific as possible — include example CLI flags, config keys, or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or screenshots that might help.
    validations:
      required: false
