name: Bug Report
description: Report a bug or unexpected behavior in omega-backup
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: omega-backup version
      description: Run `omega-backup --version` and paste the output here.
      placeholder: "e.g. omega-backup 0.4.2"
    validations:
      required: true

  - type: input
    id: borg-version
    attributes:
      label: BorgBackup version
      description: Run `borg --version` and paste the output here.
      placeholder: "e.g. borg 1.4.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04 x86_64"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Run `omega-backup backup`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: |
        Run the failing command with `RUST_LOG=debug` and paste the relevant output here.
        ```
        RUST_LOG=debug omega-backup <command>
        ```
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant config (sanitized)
      description: Paste the relevant portions of your `config.toml` with any sensitive values (passwords, keys, IPs) replaced.
      render: toml
    validations:
      required: false
